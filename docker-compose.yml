services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: oncograph
      POSTGRES_USER: oncograph_user
      POSTGRES_PASSWORD: oncograph_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oncograph_user -d oncograph"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
